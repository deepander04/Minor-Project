events {
    worker_connections 1024;
}

http {
    # ─── Rate Limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream auth_backend {
        server auth_service:5001;
    }
    upstream upload_backend {
        server upload_service:5002;
    }
    upstream preprocessing_backend {
        server preprocessing_service:5003;
    }
    upstream inference_backend {
        server inference_service:5004;
    }
    upstream report_backend {
        server report_service:5005;
    }
    upstream frontend_app {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # ─── CORS Headers ────────────────────────────────────
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        client_max_body_size 55M;  # Slightly above 50MB upload limit

        # ─── Health Check ─────────────────────────────────────
        location /health {
            return 200 '{"status": "gateway_healthy"}';
            add_header Content-Type application/json;
        }

        # ─── Auth Service Routes ──────────────────────────────
        location /api/auth/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── Upload Service Routes ────────────────────────────
        location /api/upload {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://upload_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }

        location /api/scans {
            proxy_pass http://upload_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/patients {
            proxy_pass http://upload_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Preprocessing Service Routes ─────────────────────
        location /api/preprocess {
            proxy_pass http://preprocessing_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # ─── AI Inference Service Routes ──────────────────────
        location /api/analyze {
            proxy_pass http://inference_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        location /api/results {
            proxy_pass http://inference_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/heatmap {
            proxy_pass http://inference_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/models {
            proxy_pass http://inference_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Report Service Routes ────────────────────────────
        location /api/reports {
            proxy_pass http://report_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Frontend (React SPA) ────────────────────────────
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
