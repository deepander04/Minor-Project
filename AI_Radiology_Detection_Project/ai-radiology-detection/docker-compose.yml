version: '3.9'

services:
  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: radiology_db
    environment:
      POSTGRES_DB: radiology_db
      POSTGRES_USER: radiology_user
      POSTGRES_PASSWORD: radiology_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiology_user -d radiology_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis (Message Queue) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: radiology_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Auth Service (Port 5001) ───────────────────────────────
  auth_service:
    build:
      context: ./backend
      dockerfile: auth_service/Dockerfile
    container_name: radiology_auth
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://radiology_user:radiology_pass_2026@postgres:5432/radiology_db
      - JWT_SECRET=radiology-jwt-secret-key-2026
      - FLASK_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Upload Service (Port 5002) ─────────────────────────────
  upload_service:
    build:
      context: ./backend
      dockerfile: upload_service/Dockerfile
    container_name: radiology_upload
    ports:
      - "5002:5002"
    environment:
      - DATABASE_URL=postgresql://radiology_user:radiology_pass_2026@postgres:5432/radiology_db
      - JWT_SECRET=radiology-jwt-secret-key-2026
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=52428800
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Preprocessing Service (Port 5003) ──────────────────────
  preprocessing_service:
    build:
      context: ./backend
      dockerfile: preprocessing_service/Dockerfile
    container_name: radiology_preprocessing
    ports:
      - "5003:5003"
    environment:
      - DATABASE_URL=postgresql://radiology_user:radiology_pass_2026@postgres:5432/radiology_db
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - PROCESSED_DIR=/app/processed
    volumes:
      - uploads:/app/uploads
      - processed:/app/processed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── AI Inference Service (Port 5004) ───────────────────────
  inference_service:
    build:
      context: ./backend
      dockerfile: inference_service/Dockerfile
    container_name: radiology_inference
    ports:
      - "5004:5004"
    environment:
      - DATABASE_URL=postgresql://radiology_user:radiology_pass_2026@postgres:5432/radiology_db
      - MODEL_DIR=/app/models
      - PROCESSED_DIR=/app/processed
      - HEATMAP_DIR=/app/heatmaps
    volumes:
      - processed:/app/processed
      - heatmaps:/app/heatmaps
      - models:/app/models
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Report Service (Port 5005) ─────────────────────────────
  report_service:
    build:
      context: ./backend
      dockerfile: report_service/Dockerfile
    container_name: radiology_report
    ports:
      - "5005:5005"
    environment:
      - DATABASE_URL=postgresql://radiology_user:radiology_pass_2026@postgres:5432/radiology_db
      - REPORT_DIR=/app/reports
    volumes:
      - reports:/app/reports
      - heatmaps:/app/heatmaps
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Frontend (Port 3000) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: radiology_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080

  # ─── API Gateway (Nginx - Port 8080) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: radiology_gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
      - upload_service
      - preprocessing_service
      - inference_service
      - report_service
      - frontend

volumes:
  pgdata:
  uploads:
  processed:
  heatmaps:
  reports:
  models:
